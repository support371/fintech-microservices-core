apiVersion: v1
kind: Service
metadata:
  name: converter-service
  namespace: fintech-production
  labels:
    app: converter-service
    app.kubernetes.io/part-of: fintech-microservices
spec:
  type: ClusterIP
  selector:
    app: converter-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: converter-service-hpa
  namespace: fintech-production
  labels:
    app: converter-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: converter-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
