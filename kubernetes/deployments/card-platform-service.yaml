apiVersion: apps/v1
kind: Deployment
metadata:
  name: card-platform-service
  namespace: fintech-production
  labels:
    app: card-platform-service
    app.kubernetes.io/part-of: fintech-microservices
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: card-platform-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: card-platform-service
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: fintech-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: card-platform-service
          image: "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/fintech/card-platform-service:latest"
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
              protocol: TCP
          env:
            - name: CONVERTER_INTERNAL_URL
              valueFrom:
                configMapKeyRef:
                  name: fintech-config
                  key: CONVERTER_INTERNAL_URL
            - name: KYC_MINIMUM_TIER
              valueFrom:
                configMapKeyRef:
                  name: fintech-config
                  key: KYC_MINIMUM_TIER
            - name: AML_SINGLE_TRANSACTION_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: fintech-config
                  key: AML_SINGLE_TRANSACTION_LIMIT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: fintech-config
                  key: LOG_LEVEL
          envFrom:
            - secretRef:
                name: database-secrets
            - secretRef:
                name: striga-api-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: card-platform-service
