# Kubernetes Secrets - References to AWS Secrets Manager via External Secrets Operator
# IMPORTANT: Do NOT store actual secret values in this file.
# Use AWS Secrets Manager + External Secrets Operator in production.

apiVersion: v1
kind: Secret
metadata:
  name: striga-api-secrets
  namespace: fintech-production
  labels:
    app.kubernetes.io/part-of: fintech-microservices
type: Opaque
stringData:
  # Placeholder values - replace via CI/CD or External Secrets Operator
  STRIGA_WEBHOOK_SECRET: "REPLACE_VIA_SECRETS_MANAGER"
  STRIGA_API_KEY: "REPLACE_VIA_SECRETS_MANAGER"
  STRIGA_API_BASE_URL: "https://api.striga.com/v1"

---
