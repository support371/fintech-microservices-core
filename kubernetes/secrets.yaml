  DB_HOST: "REPLACE_VIA_SECRETS_MANAGER"
  DB_PORT: "5432"
  DB_NAME: "fintech"
  DB_USER: "REPLACE_VIA_SECRETS_MANAGER"
  DB_PASSWORD: "REPLACE_VIA_SECRETS_MANAGER"

