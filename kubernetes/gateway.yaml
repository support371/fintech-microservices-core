# Network Policies for service-to-service communication security
# Acts as a gateway layer controlling traffic flow

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: fintech-production
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow card-platform-service to receive traffic from ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-card-platform-ingress
  namespace: fintech-production
spec:
  podSelector:
    matchLabels:
      app: card-platform-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8001

---
# Allow converter-service to receive traffic from ingress and card-platform-service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-converter-ingress
  namespace: fintech-production
spec:
  podSelector:
    matchLabels:
      app: converter-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              app: card-platform-service
      ports:
        - protocol: TCP
          port: 8000

---
# Allow card-platform-service to talk to converter-service and database
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-card-platform-egress
  namespace: fintech-production
spec:
  podSelector:
    matchLabels:
      app: card-platform-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: converter-service
      ports:
        - protocol: TCP
          port: 8000
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow external HTTPS (Striga API, RDS)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432

---
# Allow converter-service to access external APIs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-converter-egress
  namespace: fintech-production
spec:
  podSelector:
    matchLabels:
      app: converter-service
  policyTypes:
    - Egress
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow external HTTPS (Striga API)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 443

---
# Allow gem-dashboard to receive traffic from ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dashboard-ingress
  namespace: fintech-production
spec:
  podSelector:
    matchLabels:
      app: gem-dashboard
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 3000

---
# Allow dashboard egress for DNS only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dashboard-egress
  namespace: fintech-production
spec:
  podSelector:
    matchLabels:
      app: gem-dashboard
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
