# Nexus Locked-Build Workflow
# ===========================
# This workflow defines the gated build-and-deploy pipeline for the Nexus
# platform. Every step must pass before the next one starts. A failure at
# any gate halts the pipeline and notifies the PlatformAgent.
#
# Output contract:
#   Final step emits JSON with { "verdict": "READY" | "BLOCKED", ... }

name: nexus-locked-build
description: >
  End-to-end locked build pipeline for Alliance Trust Realty's Nexus platform.
  Ensures compliance, security, and ledger integrity before promoting a build.

triggers:
  - release.published
  - workflow_dispatch

env:
  PYTHON_VERSION: "3.x"
  CARD_SERVICE_PORT: 8001
  CONVERTER_SERVICE_PORT: 8000

steps:
  # ── Stage 1: Build ────────────────────────────────────────────────
  - id: checkout
    name: Checkout source
    action: git/checkout

  - id: install-deps
    name: Install Python dependencies
    action: python/install
    with:
      requirements:
        - requirements.txt
        - card_platform_service/requirements.txt
        - converter_service/requirements.txt

  - id: build-packages
    name: Build distribution packages
    action: python/build
    with:
      output_dir: dist/

  - id: build-docker
    name: Build Docker images
    action: docker/build
    with:
      targets:
        - context: card_platform_service/
          tag: card-platform-service:${{ run.sha }}
        - context: converter_service/
          tag: converter-service:${{ run.sha }}

  # ── Stage 2: Agent Validation Gates ───────────────────────────────
  #
  # Each gate MUST return { "status": "APPROVED" | "REJECTED", ... }.
  # The pipeline hard-stops if status != APPROVED.

  - id: compliance-gate
    name: Compliance Agent validation
    agent: ComplianceAgent
    action: validate
    expected_status: APPROVED
    description: >
      Verify that all code changes comply with KYC/AML policies and that
      no regulatory constraints are violated by the new build.
    output_format:
      type: json
      schema:
        status:
          type: string
          enum: ["APPROVED", "REJECTED"]
        reason:
          type: string
        compliance_event:
          type: object
    on_failure: halt

  - id: security-gate
    name: Security Agent validation
    agent: SecurityAgent
    action: validate
    expected_status: APPROVED
    description: >
      Scan for exposed secrets, validate HMAC configurations, and ensure
      all webhook endpoints enforce signature verification.
    output_format:
      type: json
      schema:
        status:
          type: string
          enum: ["APPROVED", "REJECTED"]
        threat_level:
          type: string
          enum: ["none", "low", "medium", "high"]
        security_event:
          type: object
    on_failure: halt

  - id: ledger-gate
    name: Ledger Agent integrity check
    agent: LedgerAgent
    action: verify_integrity
    expected_status: APPROVED
    description: >
      Confirm that the build does not introduce schema-breaking changes
      to ledger event formats and that idempotency logic is intact.
    output_format:
      type: json
      schema:
        status:
          type: string
          enum: ["APPROVED", "REJECTED"]
        reason:
          type: string
        integrity_report:
          type: object
    on_failure: halt

  - id: platform-gate
    name: Platform Agent readiness check
    agent: PlatformAgent
    action: validate
    expected_status: APPROVED
    description: >
      Verify that platform services are healthy and the deployment
      configuration is valid before proceeding.
    output_format:
      type: json
      schema:
        status:
          type: string
          enum: ["APPROVED", "REJECTED"]
        services_healthy:
          type: boolean
        reason:
          type: string
    on_failure: halt

  # ── Stage 3: Build Agent Decision ─────────────────────────────────
  #
  # The BuildAgent receives the full input pack from all four agent
  # gates and emits a final READY / BLOCKED verdict.

  - id: build-decision
    name: Build Agent final verdict
    agent: BuildAgent
    action: decide
    input_pack:
      COMPLIANCE: ${{ steps.compliance-gate.output }}
      SECURITY: ${{ steps.security-gate.output }}
      LEDGER: ${{ steps.ledger-gate.output }}
      PLATFORM: ${{ steps.platform-gate.output }}
    output_format:
      type: json
      schema:
        verdict:
          type: string
          enum: ["READY", "BLOCKED"]
        build_id:
          type: string
        reason:
          type: string
        gate_results:
          type: object
          properties:
            COMPLIANCE:
              type: string
            SECURITY:
              type: string
            LEDGER:
              type: string
            PLATFORM:
              type: string
    on_failure: halt
    requires:
      - compliance-gate
      - security-gate
      - ledger-gate
      - platform-gate

  # ── Stage 4: Deploy (only if verdict == READY) ────────────────────
  - id: publish-artifacts
    name: Publish packages to PyPI
    action: pypi/publish
    with:
      dist_dir: dist/
    requires:
      - build-decision

  - id: push-images
    name: Push Docker images to registry
    action: docker/push
    with:
      registry: gcr.io
    requires:
      - build-decision

  - id: deploy
    name: Deploy to Cloud Run
    agent: PlatformAgent
    action: deploy
    with:
      services:
        - card_platform_service
        - converter_service
    requires:
      - publish-artifacts
      - push-images

  # ── Stage 5: Post-deploy ──────────────────────────────────────────
  - id: record-deployment
    name: Record deployment in ledger
    agent: LedgerAgent
    action: record
    with:
      event_type: deployment_promoted
      payload:
        commit: ${{ run.sha }}
        build_id: ${{ steps.build-decision.output.build_id }}
        services:
          - card_platform_service
          - converter_service
    requires:
      - deploy

  - id: notify
    name: Notify stakeholders
    action: notify
    with:
      channels:
        - platform-alerts
      message: >
        Nexus locked-build ${{ run.id }} completed successfully.
        Commit: ${{ run.sha }}
        Verdict: ${{ steps.build-decision.output.verdict }}
    requires:
      - record-deployment
