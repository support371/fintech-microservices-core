# =============================================================================
# Prometheus Alert Rules - Fintech Platform
# =============================================================================

groups:
  - name: fintech-api-alerts
    rules:
      # High API latency
      - alert: HighAPILatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) > 2
        for: 5m
        labels:
          severity: warning
          compliance: sla
        annotations:
          summary: "High API latency detected on {{ $labels.service }}"
          description: "95th percentile latency is {{ $value }}s (threshold: 2s)"

      # High error rate
      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) by (service) / sum(rate(http_requests_total[5m])) by (service) > 0.05
        for: 5m
        labels:
          severity: critical
          compliance: sla
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      # Service down
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.instance }} has been down for more than 1 minute"

  - name: fintech-transaction-alerts
    rules:
      # Transaction failure rate
      - alert: HighTransactionFailureRate
        expr: sum(rate(transaction_failures_total[5m])) / sum(rate(transaction_attempts_total[5m])) > 0.01
        for: 5m
        labels:
          severity: critical
          compliance: financial
        annotations:
          summary: "High transaction failure rate"
          description: "Transaction failure rate is {{ $value | humanizePercentage }} (threshold: 1%)"

      # AML rejection spike
      - alert: AMLRejectionSpike
        expr: sum(rate(aml_rejections_total[15m])) > 10
        for: 5m
        labels:
          severity: warning
          compliance: aml
        annotations:
          summary: "AML rejection rate spike detected"
          description: "{{ $value }} AML rejections in the last 15 minutes"

  - name: fintech-security-alerts
    rules:
      # Authentication failures
      - alert: HighAuthenticationFailures
        expr: sum(rate(authentication_failures_total[5m])) > 20
        for: 5m
        labels:
          severity: critical
          compliance: security
        annotations:
          summary: "High authentication failure rate"
          description: "{{ $value }} auth failures per second (possible brute force)"

      # Invalid webhook signatures
      - alert: InvalidWebhookSignatures
        expr: sum(rate(webhook_signature_failures_total[5m])) > 5
        for: 2m
        labels:
          severity: critical
          compliance: security
        annotations:
          summary: "Invalid webhook signatures detected"
          description: "{{ $value }} invalid signatures per second (possible tampering)"

  - name: fintech-infrastructure-alerts
    rules:
      # High CPU usage
      - alert: HighCPUUsage
        expr: sum(rate(container_cpu_usage_seconds_total[5m])) by (pod) / sum(container_spec_cpu_quota / container_spec_cpu_period) by (pod) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.pod }}"
          description: "CPU usage is {{ $value | humanizePercentage }}"

      # High memory usage
      - alert: HighMemoryUsage
        expr: container_memory_working_set_bytes / container_spec_memory_limit_bytes > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.pod }}"
          description: "Memory usage is {{ $value | humanizePercentage }}"

      # Pod restart loop
      - alert: PodRestartLoop
        expr: increase(kube_pod_container_status_restarts_total[1h]) > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} is in a restart loop"
          description: "{{ $value }} restarts in the last hour"
